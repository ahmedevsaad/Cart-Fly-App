<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>CartFly — CartFly Popup 4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@600&amp;family=Instrument+Serif&amp;family=Alan+Sans:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system.css">
</head>
<body class="bg-slate-100">
  <main class="cf-frame" style="background-image:url(../assets/pattern/airplane_box.svg);background-size:240px;background-repeat:repeat;">
    <!-- Full-bleed Shein checkout screenshot background -->
    

    <!-- CartFly popup card -->
    <div class="absolute" style="left:25px;top:169px;width:345px;height:366px;border-radius:43px;background:#8fd0ebe0;">
      <div class="font-accent text-black text-center" style="position:absolute;left:98px;top:12px;width:144px;font-size:24px;">cartfly</div>

      <!-- cart cost pill -->
      <div class="absolute flex items-center justify-center" style="left:128px;top:50px;width:95px;height:40px;border-radius:10px;background:#8fd0eb96;border:1px solid #ffffff;">
        <span class="font-accent text-black text-center" style="font-size:19px;">cart cost</span>
      </div>

      <!-- inner result panel -->
      <div class="absolute" style="left:16px;top:99px;width:309px;height:216px;border-radius:5px;background:#bddbe2;">
        <div class="absolute font-alt text-black text-center" style="left:55px;top:30px;width:204px;font-size:26px;line-height:1.1;white-space:pre-line;">EST. cost
=</div>
        <div class="absolute font-alt text-black text-left" style="left:33px;top:99px;width:253px;font-size:26px;line-height:1.3;white-space:pre-line;">TAX=
Customs=
Delivery=
</div>
      </div>

      <!-- Done pill -> back to completed checkout -->
      <a href="shein-checkout-final.html" class="absolute flex items-center justify-center" style="left:129px;top:327px;width:89px;height:34px;border-radius:10px;background:#8fd0eb96;border:1px solid #ffffff;">
        <span class="font-alt text-black text-center" style="font-size:19px;">Done</span>
      </a>
    </div>
  </main>



</body></html>
