<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>CartFly — My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@600&amp;family=Instrument+Serif&amp;family=Alan+Sans:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system.css">
</head>
<body class="bg-slate-100">
  <main class="cf-frame" style="background-image:url(../assets/pattern/airplane_box.svg);background-size:240px;background-repeat:repeat;">
    <!-- Faint airplane/box pattern background, exported from Figma (150:7) -->
    

    <div class="relative z-10 px-6 pt-8 pb-28">
      <!-- Logo + title -->
      <h1 class="font-display text-[32px] leading-none text-center mb-1">
        <span class="text-[#1a3a8f]">Cart</span><span class="text-[#3b82f6]">Fly</span>
      </h1>
      <h2 class="text-[26px] font-semibold tracking-wide text-center mb-6">My Profile</h2>

      <!-- Avatar -->
      <div class="flex justify-center mb-10">
        <img src="../assets/images/my-profile-avatar.png" alt="Profile photo" class="w-[143px] h-[125px] rounded-full object-cover">
      </div>

      <!-- Profile fields -->
      <div class="space-y-[21px] text-[18px]">
        <p>Name:</p>
        <p>Phone number:</p>
        <p>Email address:</p>
        <p>Country:</p>
        <p>Your plan:</p>
      </div>

      <!-- Contact us card -->
      <div class="rounded-[22px] bg-[#f1f3f5] py-3 px-6 mt-12 text-center">
        <p class="text-[18px] font-light text-[#1a1a1a] leading-tight">contact us:</p>
        <p class="text-[18px] font-light text-[#1a1a1a] leading-tight">cartflylog@gmail.com</p>
      </div>

      <!-- Sign out -->
      <div class="flex justify-center mt-7">
        <a href="login.html" class="inline-flex items-center gap-2 rounded-xl bg-[#fa5d5f] pl-3 pr-6 py-3">
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.6" class="w-7 h-7">
            <circle cx="12" cy="12" r="9"></circle><path d="M12 8l3 4-3 4"></path><path d="M15 12H8"></path>
          </svg>
          <span class="text-[16px] font-medium">Sign out</span>
        </a>
      </div>
    </div>

    <!-- Bottom navigation -->
    
  <nav class="cf-bottomnav">
        <a href="main.html" class="cf-nav-item" aria-label="Home"><img src="../assets/icons/home.svg" alt=""><span>Home</span></a>
        <a href="my-profile.html" class="cf-nav-item" aria-label="Profile"><img src="../assets/icons/account_circle.svg" alt=""></a>
        <a href="menu.html" class="cf-nav-item cf-nav-menu" aria-label="Menu">☰</a>
        <a href="settings.html" class="cf-nav-item" aria-label="Settings"><img src="../assets/icons/settings.svg" alt=""></a></nav></main>



</body></html>
