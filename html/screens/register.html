<!doctype html>
<html lang="en"><head></head><body class="bg-slate-100">﻿


  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>CartFly - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@600&amp;family=Instrument+Serif&amp;family=Alan+Sans:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system.css">


  <main class="cf-frame" style="background-image:url(../assets/pattern/airplane_box.svg);background-size:240px;background-repeat:repeat;">
    <!-- background image -->
    

    <!-- back chevron -->
    <a href="home.html" class="absolute top-3 left-3 z-20 flex items-center justify-center w-9 h-9">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </a>

    <div class="relative z-10 px-[28px] pt-[110px] pb-10 flex flex-col">
      <h2 class="text-[32px] font-semibold text-black text-center mb-4">Register</h2>

      <div class="flex flex-col gap-[6px] mb-2">
        <label class="font-alt text-[24px] text-black">Full name:</label>
        <input type="text" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <div class="flex flex-col gap-[6px] mb-2">
        <label class="font-alt text-[24px] text-black">Phone number:</label>
        <input type="tel" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <div class="flex flex-col gap-[6px] mb-2">
        <label class="font-alt text-[24px] text-black">Email:</label>
        <input type="email" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <div class="flex flex-col gap-[6px] mb-2">
        <label class="font-alt text-[24px] text-black">Country:</label>
        <input type="text" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <div class="flex flex-col gap-[6px] mb-2">
        <label class="font-alt text-[24px] text-black">Currency:</label>
        <input type="text" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <div class="flex flex-col gap-[6px] mb-2">
        <label class="font-alt text-[24px] text-black">Password:</label>
        <input type="password" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <div class="flex flex-col gap-[6px] mb-4">
        <label class="font-alt text-[24px] text-black">Confirm password</label>
        <input type="password" class="w-[340px] h-[45px] rounded-[10px] bg-[#f0f0f3] border border-[#16447b] px-3">
      </div>

      <a href="welcome.html" class="self-center w-[212px] h-[40px] rounded-[10px] bg-[#86a6ea] flex items-center justify-center">
        <span class="font-alt text-white text-[22px]">Create account</span>
      </a>
    </div>
  </main>




</body></html>
