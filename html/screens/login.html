<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>CartFly — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@600&amp;family=Instrument+Serif&amp;family=Alan+Sans:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system.css">
</head>
<body class="bg-slate-100">
  <main class="cf-frame bg-[#c5e2ff] flex flex-col items-center">
    <div class="mt-[120px] text-center px-4">
      <h1 class="font-display text-[96px] leading-none" style="text-shadow: 4px 4px 6px rgba(0,0,0,0.25);"><span class="text-[#16307a]">Cart</span><span class="text-[#3f6ee0]">Fly</span></h1>
      <p class="text-[18px] text-[#64748b] mt-1">from cart to doorstep</p>
    </div>

    <h2 class="text-[32px] font-semibold text-black mt-[40px]">Login</h2>

    <div class="w-full px-[18px] mt-[26px] flex flex-col gap-1">
      <label class="text-[18px] text-black">Email:</label>
      <input type="email" class="w-full h-[45px] rounded-[10px] bg-[#f1f3f5] border border-[#848484] px-3">
    </div>

    <div class="w-full px-[18px] mt-[40px] flex flex-col gap-1">
      <label class="text-[18px] text-black">Password:</label>
      <input type="password" class="w-full h-[45px] rounded-[10px] bg-[#f1f3f5] border border-[#848484] px-3">
    </div>

    <div class="w-full px-[18px] mt-3">
      <a href="javascript:void(0)" class="text-[18px] text-black font-alt">Forget password?</a>
    </div>

    <a href="welcome.html" class="mt-[40px] w-[163px] h-[40px] rounded-[10px] bg-[#86a6ea] flex items-center justify-center">
      <span class="text-white text-[18px]">Login</span>
    </a>

    <a href="register.html" class="mt-[40px] w-[226px] h-[59px] rounded-[10px] bg-[#c5e2ff] border border-[#2563eb] flex items-center justify-center">
      <span class="text-[#120101] text-[18px] text-center leading-tight">Don’t have an account</span>
    </a>
  </main>



</body></html>
