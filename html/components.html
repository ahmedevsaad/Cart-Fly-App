<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartFly - Component Reference</title>
  <link rel="stylesheet" href="design-system.css">
</head>
<body>
  <!-- ============================================================= -->
  <!-- Reusable reference blocks. Copy/paste into screen templates.  -->
  <!-- ============================================================= -->

  <!-- Top bar: back chevron + CartFly wordmark -->
  <header class="cf-topbar">
    <img src="../assets/icons/chevron-back.svg" alt="Back" width="24" height="24">
    <span class="font-display">CartFly</span>
  </header>

  <!-- Primary button sample -->
  <a href="#" class="cf-btn">Login</a>

  <!-- Bottom navigation: Home / account / Settings -->
  <nav class="cf-bottomnav">
    <a href="#" aria-label="Home">
      <img src="../assets/icons/home.svg" alt="Home" width="24" height="24">
    </a>
    <a href="#" aria-label="Account">
      <img src="../assets/icons/account_circle.svg" alt="Account" width="24" height="24">
    </a>
    <a href="#" aria-label="Settings">
      <img src="../assets/icons/settings.svg" alt="Settings" width="24" height="24">
    </a>
  </nav>
</body>
</html>
