name: cartfly
description: "CartFly — cross-border shopping assistant."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  provider: ^6.1.2
  go_router: ^14.6.1
  shared_preferences: ^2.3.2

  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  country_flags: ^3.2.0
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  fake_cloud_firestore: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/flags/
    - assets/maps/
    - assets/pattern/
    - assets/icons/
    - assets/images/
